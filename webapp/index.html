<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{

margin:0;
background:#000;
color:white;

font-family:Inter, sans-serif;

display:flex;
justify-content:center;

}

.container{

width:100%;
max-width:360px;

padding:20px;

text-align:center;

}


.logo{

width:110px;

margin-top:30px;
margin-bottom:20px;

}


.brand{

font-size:24px;

letter-spacing:4px;

font-weight:300;

margin-bottom:6px;

}


.subtitle{

color:#888;

margin-bottom:30px;

font-size:14px;

}


/* одинаковые блоки */

.field{

width:100%;

height:56px;

margin-bottom:14px;

border-radius:14px;

border:1px solid #222;

background:#111;

color:white;

font-size:16px;

padding-left:16px;

box-sizing:border-box;

}


.field:focus{

outline:none;

border:1px solid #8fdcff;

}



button{

width:100%;

height:56px;

margin-top:10px;

border-radius:14px;

border:none;

font-size:16px;

font-weight:600;

background:#8fdcff;

color:black;

}


button:active{

transform:scale(0.98);

}


.space{

height:30px;

}


</style>

</head>


<body>

<div class="container">

<img class="logo" src="logo.png">


<div class="brand">

kaburo

</div>


<div class="subtitle">

заявка на худи

</div>



<input
class="field"
id="name"
placeholder="Имя">


<select
class="field"
id="size">

<option value="">
Размер
</option>

<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>

</select>



<input
class="field"
id="city"
placeholder="Город">


<input
class="field"
id="contact"
placeholder="Telegram или телефон">



<button onclick="sendData()">

Отправить заявку

</button>


<div class="space"></div>


</div>


<script>

function sendData(){

let data={

name:
document.getElementById("name").value,

size:
document.getElementById("size").value,

city:
document.getElementById("city").value,

contact:
document.getElementById("contact").value

};

Telegram.WebApp.sendData(
JSON.stringify(data)
);

Telegram.WebApp.close();

}

</script>

</body>

</html>
