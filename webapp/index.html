<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#000;
color:white;
font-family:Inter, sans-serif;
display:flex;
justify-content:center;
}

.container{

width:100%;
max-width:360px;

padding:16px 20px 30px 20px;
text-align:center;

}

/* LOGO */

.logo{

width:150px;
margin:10px auto 5px auto;
display:block;

}

/* HEADER */

.brand{

font-size:22px;
letter-spacing:3px;
font-weight:400;
margin-bottom:6px;

}

.title{

font-size:18px;
font-weight:500;
margin-top:6px;
margin-bottom:4px;

}

.subtitle{

color:#9a9a9a;
font-size:14px;
margin-bottom:24px;

}

/* LABELS */

.label{

text-align:left;
font-size:13px;
color:#bbb;
margin-bottom:6px;
margin-top:12px;

}

/* INPUTS */

.field{

width:100%;
height:54px;

border-radius:14px;
border:1px solid #222;

background:#111;

color:white;
font-size:16px;

padding-left:14px;

box-sizing:border-box;

}

.field:focus{

outline:none;
border:1px solid #8fdcff;

}

/* SIZE BLOCK */

.sizeContainer{

margin-top:6px;
margin-bottom:6px;

}

/* BUTTON */

button{

width:100%;
height:58px;

margin-top:22px;

border-radius:16px;
border:none;

font-size:17px;
font-weight:600;

background:#8fdcff;
color:#000;

}

/* TRUST TEXT */

.trust{

margin-top:16px;
font-size:13px;
color:#777;
line-height:1.4;

}

/* SPACE */

.bottom{

height:20px;

}

</style>

</head>

<body>

<div class="container">

<img class="logo" src="logo.png">


<div class="brand">

kaburo

</div>


<div class="title">

Оставьте заявку на худи Kaburo

</div>


<div class="subtitle">

Мы свяжемся с вами для подтверждения заказа

</div>



<div class="label">

Имя *

</div>

<input
class="field"
id="name"
placeholder="Введите имя">



<div class="label">

Размер *

</div>

<select
class="field sizeContainer"
id="size">

<option value="">
Выберите размер
</option>

<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>

</select>



<div class="label">

Город *

</div>

<input
class="field"
id="city"
placeholder="Ваш город">



<div class="label">

Контакт (Telegram @username или телефон) *

</div>

<input
class="field"
id="contact"
placeholder="@username или номер">



<button onclick="sendData()">

Отправить заявку →

</button>



<div class="trust">

Ответим в Telegram в течение 24 часов

</div>


<div class="bottom"></div>


</div>



<script>

function sendData(){

let data={

name:
document.getElementById("name").value,

size:
document.getElementById("size").value,

city:
document.getElementById("city").value,

contact:
document.getElementById("contact").value

};

Telegram.WebApp.sendData(
JSON.stringify(data)
);

Telegram.WebApp.close();

}

</script>

</body>

</html>
